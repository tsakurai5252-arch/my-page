<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>セルフレジ</title>
<script src="https://unpkg.com/@zxing/library@0.20.0"></script>
<style>
  body { font-family: sans-serif; text-align: center; background: #f0f0f0; margin: 0; padding: 10px; }
  header { background: #2c3e50; color: white; padding: 15px; font-size: 24px; }
  button { font-size: 18px; padding: 12px 20px; margin: 8px; cursor: pointer; }
  #frame { position: relative; display: inline-block; margin-top: 20px; width: 100%; max-width: 420px; }
  video { width: 100%; border: 4px solid black; border-radius: 10px; display: block; background: #000; }
  #guide { position: absolute; border: 4px solid red; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
  .guide-barcode { width: 80%; height: 30%; }
  .guide-qr { width: 60%; height: 60%; }
  table { margin: auto; border-collapse: collapse; background: white; margin-top: 20px; width: 90%; }
  td, th { border: 1px solid #ccc; padding: 10px; }
  #total { font-size: 28px; margin-top: 20px; }
  #finishMsg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; align-items: center; justify-content: center; font-size: 32px; z-index: 100; }
</style>
</head>
<body>

<div id="finishMsg">ご利用ありがとうございました。</div>

<header>セルフレジ</header>

<div id="startScreen">
  <h2>開始するにはボタンを押してください</h2>
  <button onclick="startRegister()">開始 (カメラ起動)</button>
</div>

<div id="cameraArea" style="display:none">
  <div id="frame">
    <video id="video" playsinline muted autoplay></video>
    <div id="guide" class="guide-barcode"></div>
  </div>
</div>

<div id="mainUI" style="display:none">
  <div class="panel">
    <button id="nextBtn" onclick="nextScan()" style="display:none">次へ (スキャン再開)</button>
    <button onclick="removeItem()">取消</button>
  </div>
  <table>
    <thead><tr><th>コード</th><th>価格</th></tr></thead>
    <tbody id="items"></tbody>
  </table>
  <div id="total">合計 ¥0</div>
  <button onclick="goPay()">会計へ</button>
</div>

<div id="paySelect" style="display:none">
  <button onclick="payCash()">現金</button>
  <button onclick="payQR()">QR決済</button>
</div>

<div id="cashUI" style="display:none">
  <h3>お支払い金額: <span id="cashTotalDisplay">0</span>円</h3>
  <input id="cashInput" type="number" placeholder="投入金額を入力">
  <button onclick="calcChange()">計算</button>
  <h3 id="change"></h3>
  <button id="completeBtn" disabled onclick="finish()">完了</button>
</div>

<div id="qrUI" style="display:none">
  <h2>QRを読み取ってください</h2>
</div>

<div id="qrCompleteUI" style="display:none">
  <h3 id="qrResultText"></h3>
  <button onclick="finish()">完了</button>
</div>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>
const reader = new ZXing.BrowserMultiFormatReader();
let scanLock = false;
let total = 0;
const priceDB = { "4970000000019": 1000, "4970000000020": 200, "4970000000037": 300 };

function startScanning() {
  reader.reset();
  reader.decodeFromConstraints({ video: { facingMode: "environment" } }, 'video', (result, err) => {
    if (result && !scanLock) handleScan(result.text);
  });
}

function startRegister() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("cameraArea").style.display = "block";
  document.getElementById("mainUI").style.display = "block";
  startScanning();
}

function handleScan(text) {
  scanLock = true;
  document.getElementById("beep").play();

  if (priceDB[text]) {
    total += priceDB[text];
    let tr = document.createElement("tr");
    tr.innerHTML = `<td>${text}</td><td>${priceDB[text]}</td>`;
    document.getElementById("items").appendChild(tr);
    document.getElementById("total").innerText = "合計 ¥" + total;
  } 
  else {
    let match = text.match(/(\d+)円/);
    if (match) {
      let val = parseInt(match[1]);
      reader.reset();
      document.getElementById("cameraArea").style.display = "none";
      document.getElementById("qrUI").style.display = "none";
      document.getElementById("qrCompleteUI").style.display = "block";
      
      // QR金額決済時のお釣り計算
      let change = (val >= total) ? (val - total) : 0;
      document.getElementById("qrResultText").innerText = `決済金額: ${val}円\nお釣り: ${change}円`;
      return;
    }
  }
  
  if (total > 0) document.getElementById("nextBtn").style.display = "inline";
  else scanLock = false;
}

function nextScan() {
  scanLock = false;
  document.getElementById("nextBtn").style.display = "none";
}

function finish() {
  document.getElementById("finishMsg").style.display = "flex";
  setTimeout(() => { location.reload(); }, 10000);
}

function goPay() { 
  document.getElementById("mainUI").style.display = "none"; 
  document.getElementById("paySelect").style.display = "block"; 
}
function payCash() { 
  document.getElementById("paySelect").style.display = "none"; 
  document.getElementById("cashUI").style.display = "block"; 
  document.getElementById("cashTotalDisplay").innerText = total;
}
function payQR() { 
  document.getElementById("paySelect").style.display = "none"; 
  document.getElementById("qrUI").style.display = "block"; 
  startScanning(); 
}
function calcChange() {
  let cash = parseInt(document.getElementById("cashInput").value);
  if (!isNaN(cash) && cash >= total) { 
    document.getElementById("change").innerText = "お釣り " + (cash - total) + "円"; 
    document.getElementById("completeBtn").disabled = false; 
  } else {
    document.getElementById("change").innerText = "金額が不足しています";
  }
}
function removeItem() { location.reload(); }
</script>
</body>
</html>
