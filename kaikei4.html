<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>セルフレジ</title>
<script src="https://unpkg.com/@zxing/library@0.20.0"></script>
<style>
body{ font-family:sans-serif; text-align:center; background:#f0f0f0; margin:0; }
header{ background:#2c3e50; color:white; padding:15px; font-size:24px; }
button{ font-size:18px; padding:10px 18px; margin:8px; cursor:pointer; }
video{ width:420px; border:4px solid black; border-radius:10px; }
#frame{ position:relative; display:inline-block; margin-top:20px; }
#guide{ position:absolute; border:4px solid red; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
.guide-barcode { width:260px; height:120px; }
.guide-qr { width:250px; height:250px; }
table{ margin:auto; border-collapse:collapse; background:white; margin-top:20px; }
td,th{ border:1px solid #ccc; padding:10px; min-width:120px; }
#total{ font-size:28px; margin-top:20px; }
.panel{ margin-top:20px; }
input{ font-size:18px; padding:8px; }
</style>
</head>
<body>

<header>セルフレジ</header>

<div id="cameraArea" style="display:none">
  <div id="frame">
    <video id="video" playsinline muted autoplay></video>
    <div id="guide" class="guide-barcode"></div>
  </div>
</div>

<div id="startScreen">
  <h2>開始するにはボタンを押してください</h2>
  <button onclick="startRegister()">開始 (カメラ起動)</button>
</div>

<div id="mainUI" style="display:none">
  <div class="panel">
    <button id="nextBtn" onclick="nextScan()" style="display:none">次へ</button>
    <button onclick="removeItem()">取消</button>
  </div>
  <table>
    <thead><tr><th>コード</th><th>価格</th></tr></thead>
    <tbody id="items"></tbody>
  </table>
  <div id="total">合計 ¥0</div>
  <button onclick="goPay()">会計へ</button>
</div>

<div id="paySelect" style="display:none">
  <h2>支払い方法</h2>
  <button onclick="payCash()">現金</button>
  <button onclick="payQR()">QR決済</button>
</div>

<div id="cashUI" style="display:none">
  <h2>現金支払い</h2>
  <input id="cashInput" type="number">
  <button onclick="calcChange()">計算</button>
  <h3 id="change"></h3>
  <button id="completeBtn" disabled onclick="finish()">完了</button>
</div>

<div id="qrUI" style="display:none">
  <h2>QRを読み取ってください</h2>
  <button id="qrNext" onclick="nextScan()" style="display:none">次へ</button>
</div>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>
const reader = new ZXing.BrowserMultiFormatReader()
let scanLock=false
let total=0
let items=[]
const priceDB={ "4970000000019":1000, "4970000000020":200, "4970000000037":300 }

function updateGuide(type) {
    const guide = document.getElementById("guide");
    guide.className = (type === 'qr') ? 'guide-qr' : 'guide-barcode';
}

function startScanning(){
  reader.reset();
  const constraints = {
    video: {
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      facingMode: "environment"
    }
  };
  reader.decodeFromConstraints(constraints, 'video', (result, err) => {
    if(result){ handleScan(result.text) }
  }).catch(err => {
    console.error("カメラ起動エラー: ", err);
  });
}

function startRegister(){
  const video = document.getElementById('video');
  video.play();
  document.getElementById("startScreen").style.display="none"
  document.getElementById("cameraArea").style.display="block"
  document.getElementById("mainUI").style.display="block"
  updateGuide('barcode');
  startScanning();
}

function handleScan(text){
  if(scanLock) return
  scanLock=true
  document.getElementById("beep").play()

  if(priceDB[text]){
    let price = priceDB[text]
    total += price
    items.push({code: text, price})
    addRow(text, price)
  }
  else {
    let match = text.match(/(\d+)円/);
    if(match){
      let val = parseInt(match[1]);
      total -= val;
      alert(val + "円分として処理しました");
    } else {
      scanLock = false;
      return;
    }
  }
  updateTotal()

  if(document.getElementById("mainUI").style.display !== "none"){
    document.getElementById("nextBtn").style.display="inline"
  } else if(document.getElementById("qrUI").style.display !== "none"){
    document.getElementById("qrNext").style.display="inline"
  }
}

function nextScan(){
  scanLock=false
  document.getElementById("nextBtn").style.display="none"
  document.getElementById("qrNext").style.display="none"
}

function addRow(code,price){
  let tr=document.createElement("tr")
  tr.innerHTML="<td>"+code+"</td><td>"+price+"</td>"
  document.getElementById("items").appendChild(tr)
}

function updateTotal(){
  if(total<0) total=0
  document.getElementById("total").innerText="合計 ¥"+total
}

function removeItem(){
  if(items.length==0) return
  let last=items.pop()
  total-=last.price
  let table=document.getElementById("items")
  table.removeChild(table.lastChild)
  updateTotal()
}

function goPay(){
  document.getElementById("mainUI").style.display="none"
  document.getElementById("paySelect").style.display="block"
}

function payCash(){
  document.getElementById("paySelect").style.display="none"
  document.getElementById("cashUI").style.display="block"
  document.getElementById("cameraArea").style.display="none"
}

function payQR(){
  document.getElementById("paySelect").style.display="none"
  document.getElementById("qrUI").style.display="block"
  updateGuide('qr');
  scanLock = false
  startScanning();
}

function calcChange(){
  let cash=parseInt(document.getElementById("cashInput").value)
  let change=cash-total
  document.getElementById("change").innerText="お釣り "+change+"円"
  if(cash>=total){ document.getElementById("completeBtn").disabled=false }
}

// 完了処理の修正
function finish(){
  alert("ご利用ありがとうございました。");
  // 10秒後にリロードしてトップ画面に戻る
  setTimeout(() => {
    location.reload();
  }, 10000);
}
</script>
</body>
</html>
